[package]
name = "idled"
version = "0.1.0"
edition = "2021"
description = "Kernel-input idle manager that calls user-supplied actions per stage"
license = "MIT"

[[bin]]
name = "idled"
path = "src/main.rs"

[dependencies]
# Kernel input via /dev/input/event* — bypasses the broken wayland
# ext_idle_notifier_v1 protocol that swayidle/stasis/hypridle rely on.
evdev = { version = "0.12", features = ["tokio"] }
inotify = "0.10"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time", "fs", "process", "signal"] }
zbus = { version = "4", default-features = false, features = ["tokio"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
futures-util = "0.3"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
